{% extends 'erp/base.html' %}

{% block title %}Edit Profile - StudentTrack ERP{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="glass-card p-5">
            <h3 class="fw-bold mb-4 accent-text-gradient"><i class="fa-solid fa-user-edit me-2"></i>Edit Profile Info</h3>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-glass-label">First Name</label>
                        <input type="text" name="first_name" class="form-control form-glass-control" value="{{ form.first_name.value|default:'' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-glass-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control form-glass-control" value="{{ form.last_name.value|default:'' }}" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-glass-label">Email Address</label>
                    <input type="email" name="email" class="form-control form-glass-control" value="{{ form.email.value|default:'' }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-glass-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control form-glass-control" value="{{ form.phone.value|default:'' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-glass-label">Short Bio</label>
                    <textarea name="bio" class="form-control form-glass-control" rows="3" placeholder="Tell us about yourself...">{{ form.bio.value|default:'' }}</textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-glass-label d-block">Profile Picture</label>
                    {% if form.instance.profile.profile_pic %}
                        <div class="mb-2">
                            <img src="{{ form.instance.profile.profile_pic.url }}" alt="avatar" class="rounded-circle border border-teal" style="width: 50px; height: 50px; object-fit: cover;">
                        </div>
                    {% endif %}
                    <input type="file" name="profile_pic" class="form-control form-glass-control">
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-teal flex-grow-1 py-2">
                        <i class="fa-solid fa-save me-2"></i>Save Changes
                    </button>
                    <a href="{% url 'profile' %}" class="btn btn-glass flex-grow-1 py-2">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
