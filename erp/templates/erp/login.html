{% extends 'erp/base.html' %}

{% block title %}Sign In - StudentTrack ERP{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-lock text-teal mb-3" style="font-size: 3rem;"></i>
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted">Sign in to access your portal</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-glass-label"><i class="fa-solid fa-user me-2 text-teal"></i>Username</label>
                    <input type="text" name="username" class="form-control form-glass-control" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-glass-label"><i class="fa-solid fa-key me-2 text-teal"></i>Password</label>
                    <input type="password" name="password" class="form-control form-glass-control" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-teal w-100 py-2 fs-5 mb-3">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                </button>
            </form>
            
            <div class="text-center mt-3">
                <span class="text-muted">Don't have an account? </span>
                <a href="{% url 'signup' %}" class="text-teal text-decoration-none fw-bold">Sign Up Here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
