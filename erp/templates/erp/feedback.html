{% extends 'erp/base.html' %}

{% block title %}System Feedback - StudentTrack ERP{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="glass-card p-5">
            <h3 class="fw-bold mb-4 accent-text-gradient"><i class="fa-solid fa-comment-dots me-2"></i>Submit System Feedback</h3>
            <p class="text-muted mb-4">We would love to hear your suggestions, questions, or reviews about the StudentTrack ERP platform.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-glass-label">Feedback Subject</label>
                    <input type="text" name="subject" class="form-control form-glass-control" placeholder="Brief subject" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-glass-label">Detailed Suggestions</label>
                    <textarea name="message" class="form-control form-glass-control" rows="5" placeholder="Share your suggestions or issues here..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-teal w-100 py-2 fs-5">
                    <i class="fa-solid fa-circle-check me-2"></i>Submit Feedback
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
