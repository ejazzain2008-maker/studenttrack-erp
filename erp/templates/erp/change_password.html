{% extends 'erp/base.html' %}

{% block title %}Change Password - StudentTrack ERP{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <h3 class="fw-bold mb-4 accent-text-gradient"><i class="fa-solid fa-key me-2"></i>Change Password</h3>
            <p class="text-muted mb-4">Provide your current active password and specify a new one.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-glass-label">Current Password</label>
                    <input type="password" name="old_password" class="form-control form-glass-control" placeholder="Enter current password" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-glass-label">New Password</label>
                    <input type="password" name="new_password" class="form-control form-glass-control" placeholder="Minimum 6 characters" required>
                </div>

                <div class="mb-4">
                    <label class="form-glass-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control form-glass-control" placeholder="Confirm new password" required>
                </div>
                
                <button type="submit" class="btn btn-teal w-100 py-2 fs-5">
                    <i class="fa-solid fa-check-double me-2"></i>Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
